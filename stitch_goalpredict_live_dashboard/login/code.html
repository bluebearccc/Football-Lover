<style>
        body {
            background-color: #0b1326;
            font-family: 'Inter', sans-serif;
        }
        .stadium-bg {
            background: linear-gradient(rgba(11, 19, 38, 0.85), rgba(11, 19, 38, 0.95)),

            background-size: cover;
            background-position: center;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .input-glow:focus {
            box-shadow: 0 0 0 2px rgba(75, 226, 119, 0.2);
            border-color: #4be277;
        }
        .accent-glow {
            box-shadow: 0 0 20px rgba(75, 226, 119, 0.3);
        }
    </style>

<body class="antialiased text-on-surface overflow-hidden">
<!-- Subtle Background Atmosphere -->
<div class="fixed inset-0 stadium-bg z-0" data-alt="A wide-angle, cinematic shot of a professional football stadium at night, shrouded in a soft atmospheric mist. The vibrant pitch green grass is illuminated by powerful overhead floodlights creating a high-contrast environment with deep shadows. The color palette is dominated by deep navy blues and pitch greens, reflecting a high-performance sports analytics aesthetic."></div>
<!-- Main Content -->
<main class="relative z-10 flex min-h-screen items-center justify-center p-gutter">
<div class="w-full max-w-md">
<!-- Brand Anchor -->
<div class="flex flex-col items-center mb-base gap-2">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">sports_soccer</span>
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">GoalPredict Live</h1>
</div>
<p class="text-on-surface-variant font-body-sm text-body-sm mb-6">Elevate Your Match Prediction Game</p>
</div>
<!-- Login Card -->
<div class="glass-card rounded-xl p-8 shadow-2xl">
<form class="space-y-6" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-lg py-3 pl-11 pr-4 text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none input-glow transition-all font-body-lg text-body-lg" id="email" name="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase" for="password">Password</label>
<a class="text-primary font-label-caps text-[11px] hover:underline transition-all" href="#">Forgot password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-lg py-3 pl-11 pr-4 text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none input-glow transition-all font-body-lg text-body-lg" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant/30 bg-surface-container-lowest text-primary focus:ring-primary/20" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-sm text-body-sm text-on-surface-variant" for="remember-me">
                            Keep me logged in for 30 days
                        </label>
</div>
<!-- Sign In Button -->
<button class="w-full bg-primary text-on-primary font-headline-md text-headline-md py-4 rounded-lg hover:brightness-110 active:scale-[0.98] transition-all accent-glow flex items-center justify-center gap-2" type="submit">
                        Sign In
                        <span class="material-symbols-outlined">chevron_right</span>
</button>
<!-- Divider -->
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant/20"></div>
<span class="flex-shrink mx-4 font-label-caps text-label-caps text-on-surface-variant">OR CONTINUE WITH</span>
<div class="flex-grow border-t border-outline-variant/20"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">

<span class="font-body-sm text-body-sm font-semibold">Google</span>
</button>

                <a class="text-primary font-bold hover:underline transition-all" href="#">Create Profile</a>
</p>

<!-- Interactive micro-effects -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.parentElement.parentElement.classList.add('scale-[1.01]');
                });
                input.addEventListener('blur', () => {
                    input.parentElement.parentElement.classList.remove('scale-[1.01]');
                });
            });

            // Smooth background parallax effect
            document.addEventListener('mousemove', (e) => {
                const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
                const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
                document.querySelector('.stadium-bg').style.transform = `translate(${moveX}px, ${moveY}px) scale(1.05)`;
            });
        });
    </script>
</body></html>
